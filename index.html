<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vintage Social Counter</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400&display=swap" rel="stylesheet">

<style>
    :root {
        --panel-bg: #efe3c7;
        --panel-shadow: #cab990;
        --window-bg: #18130d;
        --window-top: #30261b;
        --window-bottom: #130e09;
        --digit-color: #f6e7c2;
        --digit-shadow: rgba(0, 0, 0, 0.38);
        --frame-color: #554431;
        --divider-color: #8f7759;
        --wheel-width: 44px;
        --wheel-height: 66px;
        --card-height: 72px;
        --label-width: 236px;
    }

    * {
        box-sizing: border-box;
    }

    [hidden] {
        display: none !important;
    }

    body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
            radial-gradient(circle at top, rgba(255, 255, 255, 0.7), transparent 38%),
            linear-gradient(180deg, #fdf6e8 0%, #e4cf9b 100%);
        font-family: Arial, sans-serif;
        padding: 20px;
    }

    .chooser-screen,
    .panel {
        display: grid;
        background: var(--panel-bg);
        padding: 22px 24px;
        border: 2px solid #d1bf95;
        border-radius: 14px;
        box-shadow:
            0 16px 36px rgba(82, 57, 21, 0.18),
            inset 0 2px 0 rgba(255, 250, 238, 0.9),
            inset 0 -4px 0 var(--panel-shadow);
        width: fit-content;
        max-width: 100%;
    }

    .chooser-screen {
        gap: 18px;
        min-width: min(100%, 720px);
    }

    .chooser-header {
        display: grid;
        gap: 6px;
        text-align: center;
    }

    .chooser-title {
        margin: 0;
        font-family: "Oswald", "Arial Narrow", Arial, sans-serif;
        font-size: 34px;
        font-weight: 400;
        letter-spacing: 0.04em;
        color: #3f311e;
    }

    .chooser-subtitle {
        margin: 0;
        color: #6e5a3f;
        font-size: 14px;
    }

    .chooser-section {
        display: grid;
        gap: 10px;
    }

    .chooser-section-title {
        margin: 0;
        font-family: "Oswald", "Arial Narrow", Arial, sans-serif;
        font-size: 22px;
        font-weight: 400;
        letter-spacing: 0.05em;
        color: #4a3923;
    }

    .platform-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
    }

    .platform-option {
        appearance: none;
        border: 2px solid #ceb98a;
        border-radius: 14px;
        background:
            linear-gradient(180deg, rgba(255, 255, 255, 0.55), rgba(240, 226, 188, 0.75)),
            linear-gradient(180deg, #f7ecd3 0%, #ead9ad 100%);
        padding: 14px 16px;
        display: grid;
        grid-template-columns: auto 1fr auto;
        align-items: center;
        gap: 12px;
        cursor: pointer;
        text-align: left;
        transition: transform 180ms ease, border-color 180ms ease, box-shadow 180ms ease, background 180ms ease;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.8), 0 6px 12px rgba(87, 63, 28, 0.08);
    }

    .platform-option:hover {
        transform: translateY(-1px);
        border-color: #a38759;
    }

    .platform-option.selected {
        border-color: #6d5330;
        background:
            linear-gradient(180deg, rgba(255, 255, 255, 0.38), rgba(223, 199, 147, 0.82)),
            linear-gradient(180deg, #f1deb0 0%, #dcc287 100%);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.82), 0 10px 18px rgba(87, 63, 28, 0.16);
    }

    .platform-option-logo {
        width: 38px;
        height: 38px;
        object-fit: contain;
        display: block;
    }

    .platform-option-name {
        color: #3f311e;
        font-family: "Oswald", "Arial Narrow", Arial, sans-serif;
        font-size: 26px;
        font-weight: 400;
        letter-spacing: 0.05em;
        line-height: 1;
    }

    .platform-option-mark {
        width: 28px;
        height: 28px;
        border-radius: 999px;
        border: 2px solid #9a8257;
        display: grid;
        place-items: center;
        color: transparent;
        font-size: 15px;
        font-weight: 700;
        transition: background 180ms ease, color 180ms ease, border-color 180ms ease;
    }

    .platform-option.selected .platform-option-mark {
        background: #5d4728;
        border-color: #5d4728;
        color: #f9edcb;
    }

    .metric-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
    }

    .metric-option {
        appearance: none;
        border: 2px solid #ceb98a;
        border-radius: 14px;
        background:
            linear-gradient(180deg, rgba(255, 255, 255, 0.55), rgba(240, 226, 188, 0.75)),
            linear-gradient(180deg, #f7ecd3 0%, #ead9ad 100%);
        min-height: 108px;
        padding: 14px 12px;
        display: grid;
        justify-items: center;
        align-content: center;
        gap: 8px;
        cursor: pointer;
        text-align: center;
        transition: transform 180ms ease, border-color 180ms ease, box-shadow 180ms ease, background 180ms ease;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.8), 0 6px 12px rgba(87, 63, 28, 0.08);
    }

    .metric-option:hover {
        transform: translateY(-1px);
        border-color: #a38759;
    }

    .metric-option.selected {
        border-color: #6d5330;
        background:
            linear-gradient(180deg, rgba(255, 255, 255, 0.38), rgba(223, 199, 147, 0.82)),
            linear-gradient(180deg, #f1deb0 0%, #dcc287 100%);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.82), 0 10px 18px rgba(87, 63, 28, 0.16);
    }

    .metric-option.locked {
        cursor: default;
    }

    .metric-option-name {
        color: #3f311e;
        font-family: "Oswald", "Arial Narrow", Arial, sans-serif;
        font-size: 24px;
        font-weight: 400;
        letter-spacing: 0.06em;
        line-height: 1;
    }

    .metric-option-note {
        color: #6e5a3f;
        font-size: 12px;
        line-height: 1.3;
    }

    .metric-option-mark {
        width: 28px;
        height: 28px;
        border-radius: 999px;
        border: 2px solid #9a8257;
        display: grid;
        place-items: center;
        color: transparent;
        font-size: 15px;
        font-weight: 700;
        transition: background 180ms ease, color 180ms ease, border-color 180ms ease;
    }

    .metric-option.selected .metric-option-mark {
        background: #5d4728;
        border-color: #5d4728;
        color: #f9edcb;
    }

    .chooser-footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
    }

    .youtube-connect-card {
        border: 2px solid #ceb98a;
        border-radius: 16px;
        padding: 16px 18px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        background:
            linear-gradient(180deg, rgba(255, 255, 255, 0.52), rgba(238, 223, 184, 0.78)),
            linear-gradient(180deg, #f7ecd3 0%, #ead9ad 100%);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.8), 0 6px 12px rgba(87, 63, 28, 0.08);
    }

    .youtube-connect-copy {
        display: grid;
        gap: 6px;
    }

    .youtube-connect-head {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
    }

    .youtube-connect-title {
        margin: 0;
        color: #3f311e;
        font-family: "Oswald", "Arial Narrow", Arial, sans-serif;
        font-size: 24px;
        font-weight: 400;
        letter-spacing: 0.05em;
        line-height: 1;
    }

    .youtube-connect-badge {
        border-radius: 999px;
        padding: 4px 10px;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.08em;
        color: #f9edcb;
        background: #8e7347;
    }

    .youtube-connect-badge.connected {
        background: #587436;
    }

    .youtube-connect-status,
    .youtube-connect-note {
        margin: 0;
        color: #6e5a3f;
        font-size: 14px;
        line-height: 1.4;
    }

    .youtube-connect-note {
        font-size: 12px;
    }

    .youtube-connect-steps {
        margin: 2px 0 0;
        padding-left: 18px;
        color: #5f4a31;
        font-size: 12px;
        line-height: 1.45;
    }

    .youtube-connect-actions {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-shrink: 0;
    }

    .connect-button,
    .secondary-button {
        appearance: none;
        border-radius: 999px;
        padding: 11px 18px;
        font-family: "Oswald", "Arial Narrow", Arial, sans-serif;
        font-size: 18px;
        letter-spacing: 0.05em;
        text-decoration: none;
        cursor: pointer;
        transition: filter 180ms ease, transform 180ms ease, opacity 180ms ease;
    }

    .connect-button {
        border: 0;
        background: linear-gradient(180deg, #b02e21 0%, #7f1f18 100%);
        color: #fff2d1;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.16), 0 8px 16px rgba(69, 20, 12, 0.18);
    }

    .secondary-button {
        border: 2px solid #8f7759;
        background: rgba(255, 248, 233, 0.4);
        color: #4b3924;
    }

    .connect-button:hover,
    .secondary-button:hover {
        transform: translateY(-1px);
        filter: brightness(1.03);
    }

    .connect-button:disabled,
    .secondary-button:disabled {
        cursor: not-allowed;
        opacity: 0.45;
        box-shadow: none;
        pointer-events: none;
    }

    .connect-button.disabled {
        pointer-events: none;
        opacity: 0.45;
        box-shadow: none;
    }

    .chooser-hint {
        margin: 0;
        color: #6e5a3f;
        font-size: 14px;
    }

    .chooser-hint.ready {
        color: #4f6a2a;
    }

    .board-public-link {
        display: inline-block;
        color: #5b4324;
        font-size: 13px;
        line-height: 1.45;
        word-break: break-all;
    }

    .start-button {
        appearance: none;
        border: 0;
        border-radius: 999px;
        padding: 12px 22px;
        background: linear-gradient(180deg, #6f5733 0%, #503b1f 100%);
        color: #f8ecca;
        font-family: "Oswald", "Arial Narrow", Arial, sans-serif;
        font-size: 22px;
        letter-spacing: 0.06em;
        cursor: pointer;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.16), 0 8px 16px rgba(43, 27, 10, 0.18);
    }

    .start-button:disabled {
        cursor: not-allowed;
        opacity: 0.45;
        box-shadow: none;
    }

    .start-button:not(:disabled):hover {
        filter: brightness(1.04);
    }

    .panel {
        grid-template-areas:
            "logo"
            "primary"
            "secondary";
        row-gap: 12px;
        justify-items: stretch;
    }

    .metric-row {
        display: flex;
        flex-direction: column;
        gap: 8px;
        align-items: center;
        width: 100%;
    }

    .primary-row {
        grid-area: primary;
    }

    .secondary-row {
        grid-area: secondary;
    }

    .logo-wrap {
        width: 100%;
        height: 96px;
        grid-area: logo;
        position: relative;
        overflow: hidden;
        padding: 10px;
        background: rgba(255, 248, 233, 0.45);
        border: 1px solid rgba(110, 87, 48, 0.2);
        border-radius: 12px;
    }

    .logo-reel {
        width: 126px;
        height: 100%;
        display: flex;
        flex-direction: column;
        margin: 0 auto;
    }

    .logo-reel.rolling {
        animation: platform-logo-reel-up 640ms cubic-bezier(0.16, 0.92, 0.24, 1.08);
    }

    .logo {
        width: 100%;
        height: 100%;
        flex: 0 0 100%;
        object-fit: contain;
        display: block;
    }

    @keyframes platform-logo-reel-up {
        0% {
            transform: translateY(0);
        }

        80% {
            transform: translateY(-105%);
        }

        92% {
            transform: translateY(-98.5%);
        }

        100% {
            transform: translateY(-100%);
        }
    }

    .counter {
        display: flex;
        flex-wrap: nowrap;
        align-items: stretch;
        gap: 5px;
    }

    .value-counter {
        height: var(--wheel-height);
    }

    .wheel-window {
        width: var(--wheel-width);
        min-width: var(--wheel-width);
        height: var(--wheel-height);
        overflow: hidden;
        position: relative;
        background: linear-gradient(180deg, #171717 0%, #0c0c0c 48%, #141414 100%);
        border: 2px solid #2d2d2d;
        border-radius: 3px;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06), inset 0 -10px 14px rgba(0, 0, 0, 0.35);
    }

    .wheel-window.blank-slot .wheel-strip {
        opacity: 0;
        visibility: hidden;
    }

    .wheel-strip {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
        will-change: transform;
    }

    .wheel-cell {
        width: var(--wheel-width);
        height: var(--wheel-height);
        display: grid;
        place-items: center;
        color: #f2ead2;
        font-family: "Oswald", "Arial Narrow", Arial, sans-serif;
        font-size: 48px;
        font-weight: 300;
        line-height: 1;
        padding: 0;
        margin: 0;
        text-shadow: 0 1px 0 rgba(255, 255, 255, 0.08), 0 2px 10px rgba(0, 0, 0, 0.2);
    }

    .label-counter {
        width: var(--label-width);
        min-width: var(--label-width);
        height: var(--card-height);
    }

    .flip-board {
        width: 100%;
        height: var(--card-height);
        position: relative;
        overflow: hidden;
        perspective: 800px;
        transform-style: preserve-3d;
        border: 2px solid var(--frame-color);
        border-radius: 6px;
        background:
            linear-gradient(180deg, rgba(255, 255, 255, 0.06), transparent 14%),
            linear-gradient(180deg, var(--window-top) 0%, var(--window-bottom) 100%);
        box-shadow:
            inset 0 1px 0 rgba(255, 255, 255, 0.08),
            inset 0 -10px 16px rgba(0, 0, 0, 0.3),
            0 3px 8px rgba(43, 27, 10, 0.22);
    }

    .flip-board.blank-slot {
        opacity: 0.22;
    }

    .flip-board.blank-slot .flip-static,
    .flip-board.blank-slot .flip-half,
    .flip-board.blank-slot .flip-char {
        opacity: 0;
    }

    .flip-static,
    .flip-half,
    .flip-char {
        position: absolute;
        inset: 0;
    }

    .flip-half {
        overflow: hidden;
        backface-visibility: hidden;
        transform-style: preserve-3d;
        will-change: transform, opacity;
    }

    .flip-top,
    .flip-top-back,
    .flip-static-top {
        top: 0;
        height: 50%;
        transform-origin: bottom center;
        background: linear-gradient(180deg, #35291d 0%, #1f1812 100%);
        border-bottom: 1px solid rgba(0, 0, 0, 0.45);
    }

    .flip-bottom,
    .flip-bottom-back,
    .flip-static-bottom {
        top: 50%;
        height: 50%;
        transform-origin: top center;
        background: linear-gradient(180deg, #1c140e 0%, #110d08 100%);
        border-top: 1px solid rgba(255, 255, 255, 0.05);
    }

    .flip-static-top::after,
    .flip-static-bottom::before,
    .flip-top::after,
    .flip-bottom::before,
    .flip-top-back::after,
    .flip-bottom-back::before {
        content: "";
        position: absolute;
        left: 0;
        width: 100%;
        height: 1px;
        background: var(--divider-color);
        opacity: 0.7;
    }

    .flip-static-top::after,
    .flip-top::after,
    .flip-top-back::after {
        bottom: 0;
    }

    .flip-static-bottom::before,
    .flip-bottom::before,
    .flip-bottom-back::before {
        top: 0;
    }

    .flip-top::before,
    .flip-bottom::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        opacity: 0;
    }

    .flip-top::before {
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(0, 0, 0, 0.42));
    }

    .flip-bottom::after {
        background: linear-gradient(180deg, rgba(0, 0, 0, 0.5), rgba(255, 255, 255, 0.02));
    }

    .flip-char {
        display: grid;
        place-items: center;
        width: 100%;
        height: var(--card-height);
        color: var(--digit-color);
        font-family: "Oswald", "Arial Narrow", Arial, sans-serif;
        font-weight: 400;
        line-height: 1;
        padding: 0;
        margin: 0;
        text-shadow: 0 2px 0 rgba(255, 255, 255, 0.06), 0 2px 10px var(--digit-shadow);
        transform: translateY(-1px);
    }

    .label-counter .flip-char {
        font-size: 40px;
        letter-spacing: 0.12em;
        white-space: nowrap;
        padding-left: 0.12em;
    }

    .flip-bottom .flip-char,
    .flip-static-bottom .flip-char,
    .flip-bottom-back .flip-char {
        transform: translateY(calc(var(--card-height) * -0.5 - 1px));
    }

    .flip-top {
        z-index: 5;
        visibility: hidden;
        transform: rotateX(0deg);
    }

    .flip-top-back,
    .flip-bottom {
        z-index: 4;
        visibility: hidden;
    }

    .flip-bottom-back,
    .flip-static-bottom {
        z-index: 2;
    }

    .flip-static-top {
        z-index: 1;
    }

    .flip-bottom {
        transform: rotateX(90deg);
        opacity: 0;
    }

    .flip-board.flipping .flip-top,
    .flip-board.flipping .flip-bottom {
        visibility: visible;
    }

    .flip-board.flipping .flip-top {
        animation: top-flip 280ms cubic-bezier(0.37, 0.01, 0.2, 1) both;
    }

    .flip-board.flipping .flip-bottom {
        animation: bottom-flip 260ms cubic-bezier(0.17, 0.84, 0.4, 1) 280ms both;
    }

    .flip-board.flipping .flip-top::before {
        animation: top-shadow 280ms ease-in both;
    }

    .flip-board.flipping .flip-bottom::after {
        animation: bottom-shadow 260ms ease-out 280ms both;
    }

    @keyframes top-flip {
        from {
            transform: rotateX(0deg);
        }

        to {
            transform: rotateX(-90deg);
        }
    }

    @keyframes bottom-flip {
        from {
            transform: rotateX(90deg);
            opacity: 0.65;
        }

        to {
            transform: rotateX(0deg);
            opacity: 1;
        }
    }

    @keyframes top-shadow {
        from {
            opacity: 0;
        }

        to {
            opacity: 1;
        }
    }

    @keyframes bottom-shadow {
        from {
            opacity: 0.85;
        }

        to {
            opacity: 0;
        }
    }

    @media (max-width: 700px) {
        :root {
            --wheel-width: 34px;
            --wheel-height: 50px;
            --card-height: 56px;
            --label-width: 176px;
        }

        .chooser-screen {
            width: min(100%, 420px);
            padding: 18px 16px;
        }

        .chooser-title {
            font-size: 28px;
        }

        .platform-grid {
            grid-template-columns: 1fr;
        }

        .metric-grid {
            grid-template-columns: 1fr;
        }

        .platform-option {
            padding: 12px 14px;
        }

        .platform-option-name {
            font-size: 22px;
        }

        .chooser-footer {
            flex-direction: column;
            align-items: stretch;
        }

        .youtube-connect-card {
            flex-direction: column;
            align-items: stretch;
        }

        .youtube-connect-actions {
            flex-direction: column;
            align-items: stretch;
        }

        .panel {
            row-gap: 8px;
            padding: 14px;
            max-width: 100vw;
            overflow-x: auto;
        }

        .logo-wrap {
            height: 76px;
        }

        .logo-reel {
            width: 88px;
        }

        .wheel-cell {
            font-size: 36px;
        }

        .label-counter .flip-char {
            font-size: 28px;
        }
    }
</style>
</head>
<body>
    <div id="chooser" class="chooser-screen"></div>
    <div id="display" class="panel" hidden></div>

<script>
    const platforms = [
        {
            key: "instagram",
            name: "Instagram",
            logo: "https://upload.wikimedia.org/wikipedia/commons/e/e7/Instagram_logo_2016.svg",
            metrics: [
                { label: "FOLLOWERS", value: "654321" },
                { label: "LIKES", value: "23456" },
                { label: "VIEWS", value: "98765" }
            ]
        },
        {
            key: "tiktok",
            name: "TikTok",
            logo: "https://upload.wikimedia.org/wikipedia/en/a/a9/TikTok_logo.svg",
            metrics: [
                { label: "FOLLOWERS", value: "845321" },
                { label: "LIKES", value: "31876" },
                { label: "VIEWS", value: "40218" }
            ]
        },
        {
            key: "facebook",
            name: "Facebook",
            logo: "https://upload.wikimedia.org/wikipedia/commons/0/05/Facebook_Logo_%282019%29.png",
            metrics: [
                { label: "FOLLOWERS", value: "111999" },
                { label: "LIKES", value: "12345" },
                { label: "VIEWS", value: "67890" }
            ]
        },
        {
            key: "youtube",
            name: "YouTube",
            logo: "https://upload.wikimedia.org/wikipedia/commons/0/09/YouTube_full-color_icon_%282017%29.svg",
            metrics: [
                { label: "FOLLOWERS", value: "123456" },
                { label: "LIKES", value: "3456" },
                { label: "VIEWS", value: "6789" }
            ]
        }
    ];

    const topRowMetricOptions = [
        { metricLabel: "VIEWS", displayLabel: "VIEWERS" },
        { metricLabel: "LIKES", displayLabel: "LIKES" }
    ];
    const followerMetricLabel = "FOLLOWERS";
    const wheelCount = 9;
    const digitChars = " 0123456789".split("");
    const blankPauseMs = 260;
    const resultHoldMs = 1200;
    const labelFlipStartMs = blankPauseMs;
    const wheelBaseDurationMs = 180;

    function createWheelWindow(chars, initialChar = chars[0]) {
        const windowEl = document.createElement("div");
        windowEl.className = "wheel-window";

        const strip = document.createElement("div");
        strip.className = "wheel-strip";

        for (let repeat = 0; repeat < 3; repeat++) {
            chars.forEach(char => {
                const cell = document.createElement("div");
                cell.className = "wheel-cell";
                cell.textContent = char;
                strip.appendChild(cell);
            });
        }

        windowEl.appendChild(strip);
        windowEl._strip = strip;
        windowEl.dataset.currentIndex = String(Math.max(chars.indexOf(initialChar), 0));
        return windowEl;
    }

    function createWheelCounter(className, count, chars, initialChar) {
        const counter = document.createElement("div");
        counter.className = `counter ${className}`;

        for (let i = 0; i < count; i++) {
            counter.appendChild(createWheelWindow(chars, initialChar));
        }

        return counter;
    }

    function snapWheel(windowEl, index) {
        const strip = windowEl._strip;
        const h = windowEl.offsetHeight;
        strip.style.transition = "none";
        strip.style.transform = `translateY(-${index * h}px)`;
        windowEl.dataset.currentIndex = String(index);
    }

    function setWheelBlankState(windowEl, isBlank) {
        windowEl.classList.toggle("blank-slot", isBlank);
        windowEl._strip.style.opacity = isBlank ? "0" : "1";
        windowEl._strip.style.visibility = isBlank ? "hidden" : "visible";
    }

    function setWheel(windowEl, chars, nextChar, animate = true, delayMs = 0, sameCharRollSteps = 0) {
        const strip = windowEl._strip;
        const h = windowEl.offsetHeight;
        const currentIndex = parseInt(windowEl.dataset.currentIndex || "0", 10);
        const targetIndex = Math.max(chars.indexOf(nextChar), 0);

        if (!animate) {
            snapWheel(windowEl, targetIndex);
            return 0;
        }

        let steps = targetIndex - currentIndex;
        if (steps < 0) steps += chars.length;

        if (steps === 0) {
            if (sameCharRollSteps > 0) {
                steps = sameCharRollSteps;
            } else {
                snapWheel(windowEl, targetIndex);
                return 0;
            }
        }

        if (steps >= chars.length) {
            steps = Math.min(steps, chars.length);
        }

        if (steps === 0) {
            snapWheel(windowEl, targetIndex);
            return 0;
        }

        const duration = wheelBaseDurationMs + steps * wheelStepDurationMs;

        strip.style.transition = "none";
        strip.style.transform = `translateY(-${currentIndex * h}px)`;

        requestAnimationFrame(() => {
            setTimeout(() => {
                strip.style.transition = `transform ${duration}ms cubic-bezier(0.22, 0.72, 0.2, 1)`;
                strip.style.transform = `translateY(-${(currentIndex + steps) * h}px)`;
            }, delayMs);
        });

        strip.addEventListener("transitionend", function handler() {
            strip.removeEventListener("transitionend", handler);
            snapWheel(windowEl, targetIndex);
        }, { once: true });

        return duration;
    }

    function animateWheelCounter(counter, chars, nextChars, animate = true, baseDelay = 0, sameCharRollSteps = 0) {
        const windows = Array.from(counter.querySelectorAll(".wheel-window"));
        let cascadeDelay = baseDelay;

        for (let index = nextChars.length - 1; index >= 0; index--) {
            const duration = setWheel(
                windows[index],
                chars,
                nextChars[index],
                animate,
                cascadeDelay,
                sameCharRollSteps
            );

            if (animate && duration > 0) {
                cascadeDelay += duration + wheelDigitSettleGapMs;
            }
        }

        return animate ? Math.max(baseDelay, cascadeDelay - wheelDigitSettleGapMs) : cascadeDelay;
    }

    async function refreshYouTubeConnection({ includeStats = false, silent = false } = {}) {
        try {
            const statusResponse = await fetch("/api/youtube/status", {
                headers: { "Accept": "application/json" },
                cache: "no-store"
            });
            const statusData = await statusResponse.json();

            youtubeState.oauthConfigured = Boolean(statusData.oauthConfigured);
            youtubeState.connected = Boolean(statusData.connected);
            youtubeState.channelId = statusData.channelId || "";
            youtubeState.channelTitle = statusData.channelTitle || "";
            youtubeState.channelThumbnailUrl = statusData.channelThumbnailUrl || "";
            youtubeState.error = statusData.error || "";

            if (!youtubeState.connected) {
                youtubeState.subscriberCount = "";
                youtubeState.viewCount = "";
                youtubeState.likeCount = "";
                resetYouTubePrototypeMetrics();
                updateYouTubeConnectionUI();
                updateChooserState();

            await refreshInstagramConnection({ includeStats: true });
            if (!instagramState.connected) {

                return;

        }

                updateChooserState();

        }

        const response = await fetch("/api/boards/publish", {

        boardState.publicUrl = data.publicUrl || "";
        boardState.platformKeys = Array.isArray(data.platformKeys) ? data.platformKeys : [];

        boardState.updatedAt = data.updatedAt || "";

            boardState.platformKeys.forEach(key => selectedPlatformKeys.add(key));

    function setBoardText(board, nextText) {
        board.dataset.currentText = nextText;
        board.querySelector(".flip-static-top .flip-char").textContent = nextText;
        board.querySelector(".flip-static-bottom .flip-char").textContent = nextText;
        board.querySelector(".flip-top .flip-char").textContent = nextText;
        board.querySelector(".flip-bottom .flip-char").textContent = nextText;
    }

    function setBoardBlankState(board, isBlank) {
        board.classList.toggle("blank-slot", isBlank);
    }

    function flipBoardTo(board, nextText, animate = true, delayMs = 0, forceFlip = false) {
        const currentText = board.dataset.currentText || "";
        const nextIsBlank = nextText.length === 0;

        if (!animate) {
            setBoardBlankState(board, nextIsBlank);
            setBoardText(board, nextText);
            return 0;
        }

        if (currentText === nextText && !forceFlip) {
            setBoardBlankState(board, nextIsBlank);
            setBoardText(board, nextText);
            return 0;
        }

        const top = board.querySelector(".flip-top .flip-char");
        const bottom = board.querySelector(".flip-bottom .flip-char");
        const staticTop = board.querySelector(".flip-static-top .flip-char");
        const staticBottom = board.querySelector(".flip-static-bottom .flip-char");

        top.textContent = currentText;
        bottom.textContent = nextText;
        staticTop.textContent = currentText;
        staticBottom.textContent = currentText;

        const totalDuration = boardFlipTopDurationMs + boardFlipBottomDurationMs;

        if (board._flipTimers) {
            board._flipTimers.forEach(clearTimeout);
        }

        board._flipTimers = [];

        board._flipTimers.push(setTimeout(() => {
            if (!nextIsBlank) {
                setBoardBlankState(board, false);
            }
            board.classList.remove("flipping");
            void board.offsetWidth;
            board.classList.add("flipping");

            board._flipTimers.push(setTimeout(() => {
                staticTop.textContent = nextText;
                staticBottom.textContent = nextText;
                board.dataset.currentText = nextText;
            }, boardFlipTopDurationMs));

            board._flipTimers.push(setTimeout(() => {
                board.classList.remove("flipping");
                setBoardBlankState(board, nextIsBlank);
                top.textContent = nextText;
                bottom.textContent = nextText;
                board._flipTimers = [];
            }, totalDuration));
        }, delayMs));

        return delayMs + totalDuration;
    }

    function animateFlipBoard(counter, nextText, animate = true, baseDelay = 0, forceFlip = false) {
        const board = counter.querySelector(".flip-board");
        return flipBoardTo(board, nextText, animate, baseDelay, forceFlip);
    }

    function clearNumber(counter) {
        const windows = Array.from(counter.querySelectorAll(".wheel-window"));

        windows.forEach(windowEl => {
            setWheel(windowEl, digitChars, " ", false);
        });
    }

    function clearLabel(counter) {
        const board = counter.querySelector(".flip-board");

        if (board._flipTimers) {
            board._flipTimers.forEach(clearTimeout);
            board._flipTimers = [];
        }

        board.classList.remove("flipping");
        setBoardBlankState(board, true);
        setBoardText(board, "");
    }

    function showNumber(counter, value, animate = true, baseDelay = 0) {
        const clean = String(value)
            .replace(/\D/g, "")
            .slice(-wheelCount)
            .padStart(wheelCount, " ");

        return animateWheelCounter(counter, digitChars, clean.split(""), animate, baseDelay, 0);
    }

    function showLabel(counter, value, animate = true, baseDelay = 0, forceFlip = false) {
        const clean = String(value)
            .toUpperCase()
            .replace(/[^A-Z ]/g, "")
            .trim();

        return animateFlipBoard(counter, clean, animate, baseDelay, forceFlip);
    }

    function changeLogo(row, newSrc, animate = true) {
        const reel = row.querySelector(".logo-reel");
        const currentSrc = reel.dataset.currentSrc || newSrc;

        if (!animate) {
            reel.dataset.currentSrc = newSrc;
            reel.innerHTML = `<img class="logo" src="${newSrc}" alt="platform logo">`;
            return;
        }

        if (currentSrc === newSrc) {
            return;
        }

        reel.classList.remove("rolling");
        reel.innerHTML = `
            <img class="logo" src="${currentSrc}" alt="platform logo">
            <img class="logo" src="${newSrc}" alt="platform logo">
        `;
        reel.dataset.currentSrc = newSrc;
        void reel.offsetWidth;
        reel.classList.add("rolling");

        reel.addEventListener("animationend", function handler() {
            reel.classList.remove("rolling");
            reel.innerHTML = `<img class="logo" src="${newSrc}" alt="platform logo">`;
            reel.removeEventListener("animationend", handler);
        });
    }

        chooser.querySelector("#publish-board").addEventListener("click", publishCurrentBoard);
        chooser.querySelector("#copy-board-link").addEventListener("click", copyPublicBoardLink);
        chooser.querySelector("#start-display").addEventListener("click", startDisplay);
        updateInstagramConnectionUI();
        updateTikTokConnectionUI();
        updateYouTubeConnectionUI();
        updateBoardPublishUI();
        updateChooserState();
    }

    function updateChooserState() {
        const chooser = document.getElementById("chooser");
        if (!chooser || chooser.hidden) {
            return;
        }

        const readiness = getChooserReadiness();
        const hint = chooser.querySelector(".chooser-hint");
        const startButton = chooser.querySelector("#start-display");

        chooser.querySelectorAll(".platform-option").forEach(option => {
            option.classList.toggle("selected", selectedPlatformKeys.has(option.dataset.platformKey));
        });

        chooser.querySelectorAll(".metric-option").forEach(option => {
            const isFollower = option.dataset.metricLabel === followerMetricLabel;
            option.classList.toggle("selected", isFollower || selectedTopMetricLabels.has(option.dataset.metricLabel));
        });

        if (readiness.canRun) {
            const metricSummary = Array.from(topRowMetricOptions)
                .filter(({ metricLabel }) => selectedTopMetricLabels.has(metricLabel))
                .map(({ displayLabel }) => displayLabel)
                .join(" and ");
            hint.textContent = `${readiness.selectedCount} platform${readiness.selectedCount === 1 ? "" : "s"} selected. ${readiness.totalMetricCount} metrics ready: followers plus ${metricSummary}.`;
            hint.classList.add("ready");
            startButton.disabled = false;
        } else {
            const needsPlatforms = readiness.selectedCount < minimumPlatformSelection;
            const needsMetrics = readiness.selectedMetricCount === 0;

            if (readiness.needsYouTubeConnection) {
                hint.textContent = youtubeState.oauthConfigured
                    ? "Connect YouTube to continue because YouTube is selected for this display."
                    : "YouTube is selected, but the server is missing its Google OAuth setup.";
            } else if (readiness.needsInstagramConnection) {
                hint.textContent = instagramState.oauthConfigured
                    ? "Connect Instagram to continue because Instagram is selected for this display."
                    : "Instagram is selected, but the server is missing its Meta OAuth setup.";
            } else if (readiness.needsTikTokConnection) {
                hint.textContent = tiktokState.oauthConfigured
                    ? "Connect TikTok to continue because TikTok is selected for this display."
                    : "TikTok is selected, but the server is missing its TikTok developer setup.";
            } else if (needsPlatforms && needsMetrics) {
                const remaining = minimumPlatformSelection - readiness.selectedCount;
                hint.textContent = `Choose ${remaining} platform${remaining === 1 ? "" : "s"} and at least one more metric so the display has two metrics total.`;
            } else if (needsPlatforms) {
                const remaining = minimumPlatformSelection - readiness.selectedCount;
                hint.textContent = `Choose ${remaining} more platform${remaining === 1 ? "" : "s"} to continue.`;
            } else {
                hint.textContent = "Choose at least one more metric: viewers, likes, or both. Followers is already included.";
            }

            hint.classList.remove("ready");
            startButton.disabled = true;
        }

        updateBoardPublishUI();
    }

    async function startDisplay() {
        if (selectedPlatformKeys.size < minimumPlatformSelection || selectedTopMetricLabels.size === 0) {
            return;
        }

        if (selectedPlatformKeys.has("instagram")) {
            await refreshInstagramConnection({ includeStats: true });
            if (!instagramState.connected) {
                updateChooserState();
                return;
            }
        }

        if (selectedPlatformKeys.has("tiktok")) {
            await refreshTikTokConnection({ includeStats: true });
            if (!tiktokState.connected) {
                updateChooserState();
                return;
            }
        }

        if (selectedPlatformKeys.has("youtube")) {
            await refreshYouTubeConnection({ includeStats: true });
            if (!youtubeState.connected) {
                updateChooserState();
                return;
            }
        }

        startConfiguredDisplay(Array.from(selectedPlatformKeys), Array.from(selectedTopMetricLabels));
    }

    function startConfiguredDisplay(platformKeys, topMetricLabels) {
        activePlatforms = platforms.filter(({ key }) => platformKeys.includes(key));
        activeTopRowMetrics = topRowMetricOptions.filter(({ metricLabel }) => topMetricLabels.includes(metricLabel));
        currentPlatformIndex = 0;
        currentRotatingMetricIndex = 0;

        if (rotationTimer) {
            clearTimeout(rotationTimer);
        }

        document.getElementById("chooser").hidden = true;
        document.getElementById("display").hidden = false;

        buildDisplay();
        renderPlatform();
        scheduleNextRotation(resultHoldMs);
    }

    function buildDisplay() {
        const display = document.getElementById("display");
        display.innerHTML = "";

        if (activePlatforms.length === 0) {
            return;
        }

        display.appendChild(createLogoReel(activePlatforms[0].logo));

        const primaryRow = document.createElement("div");
        primaryRow.className = "metric-row primary-row";
        primaryRow.appendChild(createWheelCounter("value-counter active-value-counter", wheelCount, digitChars, " "));
        primaryRow.appendChild(createLabelCounter(""));

        const secondaryRow = document.createElement("div");
        secondaryRow.className = "metric-row secondary-row";
        secondaryRow.appendChild(createWheelCounter("value-counter follower-value-counter", wheelCount, digitChars, " "));
        secondaryRow.appendChild(createLabelCounter(""));

        display.appendChild(primaryRow);
        display.appendChild(secondaryRow);
    }

    function renderPlatform({ animate = false, platformChanged = false } = {}) {
        if (activePlatforms.length === 0 || activeTopRowMetrics.length === 0) {
            return 0;
        }

        const platform = activePlatforms[currentPlatformIndex];
        const rotatingMetric = activeTopRowMetrics[currentRotatingMetricIndex];
        const activeMetricValue = getMetricValue(platform, rotatingMetric.metricLabel);
        const followerValue = getMetricValue(platform, followerMetricLabel);
        const display = document.getElementById("display");
        const primaryRow = document.querySelector(".primary-row");
        const secondaryRow = document.querySelector(".secondary-row");
        const labelCounter = primaryRow.querySelector(".label-counter");
        const activeValueCounter = primaryRow.querySelector(".active-value-counter");
        const followerCounter = secondaryRow.querySelector(".follower-value-counter");
        const followerLabelCounter = secondaryRow.querySelector(".label-counter");

        if (!animate) {
            changeLogo(display, platform.logo, false);
            showLabel(labelCounter, rotatingMetric.displayLabel, false);
            showNumber(activeValueCounter, activeMetricValue, false);
            showNumber(followerCounter, followerValue, false);
            showLabel(followerLabelCounter, followerMetricLabel, false);
            return 0;
        }

        changeLogo(display, platform.logo, platformChanged);

        const numberFinishedAt = showNumber(activeValueCounter, activeMetricValue, true, blankPauseMs);
        const labelFinishedAt = showLabel(labelCounter, rotatingMetric.displayLabel, true, labelFlipStartMs);
        const followerFinishedAt = showNumber(followerCounter, followerValue, platformChanged, blankPauseMs);
        const followerLabelFinishedAt = showLabel(
            followerLabelCounter,
            followerMetricLabel,
            platformChanged,
            labelFlipStartMs,
            platformChanged
        );

        return Math.max(numberFinishedAt, labelFinishedAt, followerFinishedAt, followerLabelFinishedAt);
    }

    function rotatePlatform() {
        if (activePlatforms.length === 0 || activeTopRowMetrics.length === 0) {
            return;
        }

        let platformChanged = false;

        if (currentRotatingMetricIndex === activeTopRowMetrics.length - 1) {
            currentRotatingMetricIndex = 0;
            currentPlatformIndex = (currentPlatformIndex + 1) % activePlatforms.length;
            platformChanged = true;
        } else {
            currentRotatingMetricIndex += 1;
        }

        const animationDuration = renderPlatform({ animate: true, platformChanged });
        scheduleNextRotation(animationDuration + resultHoldMs);
    }

    function scheduleNextRotation(delayMs) {
        if (rotationTimer) {
            clearTimeout(rotationTimer);
        }

        rotationTimer = setTimeout(() => {
            rotatePlatform();
        }, delayMs);
    }

    async function initDashboard() {
        buildChooser();
        await refreshInstagramConnection({ includeStats: true, silent: true });
        await refreshTikTokConnection({ includeStats: true, silent: true });
        await refreshYouTubeConnection({ includeStats: true, silent: true });
        await loadMyBoard();
    }

    async function initPublicBoard() {
        document.getElementById("chooser").hidden = true;
        await refreshPublicBoard();
        syncPublicBoardRefreshLoop();
    }

    async function initApp() {
        if (isPublicBoardMode) {
            await initPublicBoard();
            return;
        }

        await initDashboard();
    }

    initApp();
</script>
