<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vintage Social Counter</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400&display=swap" rel="stylesheet">

<style>
    :root {
        --panel-bg: #f5f2ea;
        --window-bg: #111111;
        --digit-color: #f2ead2;
        --frame-color: #2d2d2d;
        --wheel-width: 44px;
        --wheel-height: 66px;
    }

    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: white;
        font-family: Arial, sans-serif;
    }

    .panel {
        display: grid;
        grid-template-columns: 104px auto;
        grid-template-areas:
            "logo number"
            "logo label";
        column-gap: 16px;
        row-gap: 8px;
        align-items: center;
        background: var(--panel-bg);
        padding: 22px 24px;
        border: 1px solid #d6d1c3;
        border-radius: 8px;
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.08), inset 0 1px 0 rgba(255, 255, 255, 0.5);
    }

    .metric-row {
        display: flex;
        align-items: center;
    }

    .number-row {
        grid-area: number;
    }

    .label-row {
        grid-area: label;
    }

    .logo-wrap {
        width: 104px;
        height: calc(var(--wheel-height) * 2 + 8px);
        grid-area: logo;
        position: relative;
        overflow: hidden;
        flex: 0 0 auto;
    }

    .logo-reel {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
    }

    .logo-reel.rolling {
        animation: platform-logo-reel-up 640ms cubic-bezier(0.16, 0.92, 0.24, 1.08);
    }

    .logo {
        width: 100%;
        height: 100%;
        flex: 0 0 100%;
        object-fit: contain;
        display: block;
    }

    @keyframes platform-logo-reel-up {
        0% {
            transform: translateY(0);
        }

        80% {
            transform: translateY(-105%);
        }

        92% {
            transform: translateY(-98.5%);
        }

        100% {
            transform: translateY(-100%);
        }
    }

    .counter {
        display: flex;
        flex-wrap: nowrap;
        align-items: stretch;
        gap: 5px;
        height: var(--wheel-height);
    }

    .wheel-window {
        height: var(--wheel-height);
        overflow: hidden;
        position: relative;
        background: linear-gradient(180deg, #171717 0%, #0c0c0c 48%, #141414 100%);
        border: 2px solid var(--frame-color);
        border-radius: 3px;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06), inset 0 -10px 14px rgba(0, 0, 0, 0.35);
    }

    .wheel-window.blank-slot .wheel-strip {
        opacity: 0;
        visibility: hidden;
    }

    .label-counter .wheel-window,
    .value-counter .wheel-window {
        width: var(--wheel-width);
        min-width: var(--wheel-width);
    }

    .wheel-strip {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
        will-change: transform;
    }

    .wheel-cell {
        height: var(--wheel-height);
        display: grid;
        place-items: center;
        color: var(--digit-color);
        font-family: "Oswald", "Arial Narrow", Arial, sans-serif;
        font-weight: 300;
        line-height: 1;
        padding: 0;
        margin: 0;
        text-shadow: 0 1px 0 rgba(255, 255, 255, 0.08), 0 2px 10px rgba(0, 0, 0, 0.2);
    }

    .label-counter .wheel-cell,
    .value-counter .wheel-cell {
        width: var(--wheel-width);
        font-size: 48px;
    }

    @media (max-width: 700px) {
        :root {
            --wheel-width: 34px;
            --wheel-height: 50px;
        }

        .panel {
            grid-template-columns: 72px auto;
            column-gap: 10px;
            row-gap: 6px;
            padding: 14px;
            max-width: 100vw;
            overflow-x: auto;
        }

        .metric-row {
            gap: 0;
        }

        .logo-wrap {
            width: 72px;
            height: calc(var(--wheel-height) * 2 + 6px);
        }

        .label-counter .wheel-cell,
        .value-counter .wheel-cell {
            font-size: 36px;
        }
    }
</style>
</head>
<body>
    <div id="display" class="panel"></div>

<script>
    const platforms = [
        {
            key: "youtube",
            logo: "https://upload.wikimedia.org/wikipedia/commons/0/09/YouTube_full-color_icon_%282017%29.svg",
            metrics: [
                { label: "FOLLOWERS", value: "123456" },
                { label: "LIKES", value: "3456" },
                { label: "VIEWS", value: "6789" }
            ]
        },
        {
            key: "instagram",
            logo: "https://upload.wikimedia.org/wikipedia/commons/e/e7/Instagram_logo_2016.svg",
            metrics: [
                { label: "FOLLOWERS", value: "654321" },
                { label: "LIKES", value: "23456" },
                { label: "VIEWS", value: "98765" }
            ]
        },
        {
            key: "facebook",
            logo: "https://upload.wikimedia.org/wikipedia/commons/0/05/Facebook_Logo_%282019%29.png",
            metrics: [
                { label: "FOLLOWERS", value: "111999" },
                { label: "LIKES", value: "12345" },
                { label: "VIEWS", value: "67890" }
            ]
        }
    ];

    const wheelCount = 9;
    const digitChars = " 0123456789".split("");
    const labelChars = " ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
    const blankPauseMs = 260;
    const resultHoldMs = 1200;
    let currentPlatformIndex = 0;
    let currentMetricIndex = 0;
    let rotationTimer = null;

    function createWheelWindow(chars, initialChar = chars[0]) {
        const windowEl = document.createElement("div");
        windowEl.className = "wheel-window";

        const strip = document.createElement("div");
        strip.className = "wheel-strip";

        for (let repeat = 0; repeat < 3; repeat++) {
            chars.forEach(char => {
                const cell = document.createElement("div");
                cell.className = "wheel-cell";
                cell.textContent = char;
                strip.appendChild(cell);
            });
        }

        windowEl.appendChild(strip);
        windowEl._strip = strip;
        windowEl.dataset.currentIndex = String(Math.max(chars.indexOf(initialChar), 0));
        return windowEl;
    }

    function createCounter(className, count, chars, initialChar) {
        const counter = document.createElement("div");
        counter.className = `counter ${className}`;

        for (let i = 0; i < count; i++) {
            counter.appendChild(createWheelWindow(chars, initialChar));
        }

        return counter;
    }

    function snapWheel(windowEl, index) {
        const strip = windowEl._strip;
        const h = windowEl.offsetHeight;
        strip.style.transition = "none";
        strip.style.transform = `translateY(-${index * h}px)`;
        windowEl.dataset.currentIndex = String(index);
    }

    function setWheelBlankState(windowEl, isBlank) {
        windowEl.classList.toggle("blank-slot", isBlank);
        windowEl._strip.style.opacity = isBlank ? "0" : "1";
        windowEl._strip.style.visibility = isBlank ? "hidden" : "visible";
    }

    function setWheel(windowEl, chars, nextChar, animate = true, delayMs = 0, sameCharRollSteps = 0) {
        const strip = windowEl._strip;
        const h = windowEl.offsetHeight;
        const currentIndex = parseInt(windowEl.dataset.currentIndex || "0", 10);
        const targetIndex = Math.max(chars.indexOf(nextChar), 0);

        if (!animate) {
            snapWheel(windowEl, targetIndex);
            return 0;
        }

        let steps = targetIndex - currentIndex;
        if (steps < 0) steps += chars.length;

        if (steps === 0) {
            if (sameCharRollSteps > 0) {
                steps = sameCharRollSteps;
            } else {
                snapWheel(windowEl, targetIndex);
                return 0;
            }
        }

        if (steps >= chars.length) {
            steps = Math.min(steps, chars.length);
        }

        if (steps === 0) {
            snapWheel(windowEl, targetIndex);
            return 0;
        }

        const duration = 200 + steps * 32;

        strip.style.transition = "none";
        strip.style.transform = `translateY(-${currentIndex * h}px)`;

        requestAnimationFrame(() => {
            setTimeout(() => {
                strip.style.transition = `transform ${duration}ms cubic-bezier(0.16, 0.92, 0.24, 1.08)`;
                strip.style.transform = `translateY(-${(currentIndex + steps) * h}px)`;
            }, delayMs);
        });

        strip.addEventListener("transitionend", function handler() {
            strip.removeEventListener("transitionend", handler);
            snapWheel(windowEl, targetIndex);
        }, { once: true });

        return duration;
    }

    function animateCounter(counter, chars, nextChars, animate = true, baseDelay = 0, sameCharRollSteps = 0) {
        const windows = Array.from(counter.querySelectorAll(".wheel-window"));
        let cascadeDelay = baseDelay;

        for (let index = nextChars.length - 1; index >= 0; index--) {
            const duration = setWheel(
                windows[index],
                chars,
                nextChars[index],
                animate,
                cascadeDelay,
                sameCharRollSteps
            );
            cascadeDelay += animate ? duration : 0;
        }

        return cascadeDelay;
    }

    function clearNumber(counter) {
        const windows = Array.from(counter.querySelectorAll(".wheel-window"));

        windows.forEach(windowEl => {
            setWheel(windowEl, digitChars, " ", false);
        });
    }

    function clearLabel(counter) {
        const windows = Array.from(counter.querySelectorAll(".wheel-window"));

        windows.forEach(windowEl => {
            setWheelBlankState(windowEl, true);
            setWheel(windowEl, labelChars, " ", false);
        });
    }

    function showNumber(counter, value, animate = true, baseDelay = 0) {
        const clean = String(value)
            .replace(/\D/g, "")
            .slice(-wheelCount)
            .padStart(wheelCount, " ");

        return animateCounter(counter, digitChars, clean.split(""), animate, baseDelay, 0);
    }

    function showLabel(counter, value, animate = true, baseDelay = 0) {
        const clean = String(value)
            .toUpperCase()
            .replace(/[^A-Z ]/g, "")
            .slice(-wheelCount)
            .padStart(wheelCount, " ");

        const windows = Array.from(counter.querySelectorAll(".wheel-window"));
        const nextChars = clean.split("");
        let cascadeDelay = baseDelay;

        nextChars.forEach((char, index) => {
            if (char === " ") {
                setWheelBlankState(windows[index], true);
                setWheel(windows[index], labelChars, char, false);
            } else {
                setWheelBlankState(windows[index], false);
            }
        });

        for (let index = nextChars.length - 1; index >= 0; index--) {
            if (nextChars[index] === " ") {
                continue;
            }

            const duration = setWheel(
                windows[index],
                labelChars,
                nextChars[index],
                animate,
                cascadeDelay,
                6
            );
            cascadeDelay += animate ? duration : 0;
        }

        return cascadeDelay;
    }

    function createLogoReel(src = "") {
        const wrap = document.createElement("div");
        wrap.className = "logo-wrap";

        const reel = document.createElement("div");
        reel.className = "logo-reel";
        reel.dataset.currentSrc = src;
        reel.innerHTML = `<img class="logo" src="${src}" alt="platform logo">`;
        wrap.appendChild(reel);

        return wrap;
    }

    function changeLogo(row, newSrc, animate = true) {
        const reel = row.querySelector(".logo-reel");
        const currentSrc = reel.dataset.currentSrc || newSrc;

        if (!animate) {
            reel.dataset.currentSrc = newSrc;
            reel.innerHTML = `<img class="logo" src="${newSrc}" alt="platform logo">`;
            return;
        }

        if (currentSrc === newSrc) {
            return;
        }

        reel.classList.remove("rolling");
        reel.innerHTML = `
            <img class="logo" src="${currentSrc}" alt="platform logo">
            <img class="logo" src="${newSrc}" alt="platform logo">
        `;
        reel.dataset.currentSrc = newSrc;
        void reel.offsetWidth;
        reel.classList.add("rolling");

        reel.addEventListener("animationend", function handler() {
            reel.classList.remove("rolling");
            reel.innerHTML = `<img class="logo" src="${newSrc}" alt="platform logo">`;
            reel.removeEventListener("animationend", handler);
        });
    }

    function buildDisplay() {
        const display = document.getElementById("display");
        display.innerHTML = "";

        display.appendChild(createLogoReel(platforms[0].logo));

        const numberRow = document.createElement("div");
        numberRow.className = "metric-row number-row";
        numberRow.appendChild(createCounter("value-counter", wheelCount, digitChars, " "));

        const labelRow = document.createElement("div");
        labelRow.className = "metric-row label-row";
        labelRow.appendChild(createCounter("label-counter", wheelCount, labelChars, " "));

        display.appendChild(numberRow);
        display.appendChild(labelRow);
    }

    function renderPlatform(animate = false) {
        const platform = platforms[currentPlatformIndex];
        const metric = platform.metrics[currentMetricIndex];
        const display = document.getElementById("display");
        const numberRow = document.querySelector(".number-row");
        const labelRow = document.querySelector(".label-row");
        const labelCounter = labelRow.querySelector(".label-counter");
        const valueCounter = numberRow.querySelector(".value-counter");

        if (!animate) {
            changeLogo(display, platform.logo, false);
            showNumber(valueCounter, metric.value, false);
            showLabel(labelCounter, metric.label, false);
            return 0;
        }

        changeLogo(display, platform.logo, false);
        clearNumber(valueCounter);
        clearLabel(labelCounter);

        const numberFinishedAt = showNumber(valueCounter, metric.value, true, blankPauseMs);
        const labelFinishedAt = showLabel(labelCounter, metric.label, true, numberFinishedAt);

        return labelFinishedAt;
    }

    function rotatePlatform() {
        currentMetricIndex = (currentMetricIndex + 1) % platforms[currentPlatformIndex].metrics.length;

        if (currentMetricIndex === 0) {
            currentPlatformIndex = (currentPlatformIndex + 1) % platforms.length;
        }

        const animationDuration = renderPlatform(true);
        scheduleNextRotation(animationDuration + resultHoldMs);
    }

    function scheduleNextRotation(delayMs) {
        if (rotationTimer) {
            clearTimeout(rotationTimer);
        }

        rotationTimer = setTimeout(() => {
            rotatePlatform();
        }, delayMs);
    }

    buildDisplay();
    renderPlatform(false);
    scheduleNextRotation(resultHoldMs + 1500);
</script>
</body>
</html>
